<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños, Pollito</title>
    <style>
        :root {
            --color-bg: #ffe6e6;            /* Rosa claro para el fondo */
            --color-sobre: #ff6b6b;         /* Rosa fuerte para el sobre */
            --color-sobre-oscuro: #e65c5c;  /* Rosa medio */
            --color-sobre-interior: #cc4e4e;/* Rojo suave para el interior */
            --color-carta: #ffffff;         /* Fondo blanco para la carta */
            --color-texto: #4a4a4a;         /* Gris oscuro para el texto */
        }

        body {
            background-color: var(--color-bg);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- CONTENEDOR DEL SOBRE --- */
        .contenedor-sobre {
            position: relative;
            width: 280px;
            height: 180px;
            background-color: var(--color-sobre-oscuro);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.5s, opacity 0.5s ease;
        }

        /* Caras laterales e inferior del sobre */
        .contenedor-sobre::before {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: transparent var(--color-sobre) var(--color-sobre) transparent;
            border-radius: 0 0 10px 0;
            z-index: 3;
        }

        .contenedor-sobre::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: transparent transparent var(--color-sobre) var(--color-sobre);
            border-radius: 0 0 0 10px;
            z-index: 3;
        }

        /* Solapa superior del sobre */
        .solapa {
            position: absolute;
            top: 0; left: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: var(--color-sobre-interior) transparent transparent transparent;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 4;
        }

        /* Sticker de corazón para abrir el sobre */
        .sticker-corazon {
            position: absolute;
            top: 75px;
            left: 125px;
            font-size: 2rem;
            z-index: 5;
            transition: transform 0.3s, opacity 0.3s;
            pointer-events: none; /* Asegura que el clic pase directo al sobre */
        }

        /* --- ANIMACIÓN DE APERTURA --- */
        .contenedor-sobre.abierto .solapa {
            transform: rotateX(180deg);
            z-index: 1; /* Se va al fondo para no bloquear la pantalla */
        }

        .contenedor-sobre.abierto .sticker-corazon {
            transform: scale(0);
            opacity: 0;
        }

        .contenedor-sobre.desvanecer {
            opacity: 0;
            transform: scale(0.5) translateY(100px);
            pointer-events: none;
        }

        /* --- SECCIÓN DE LA CARTA --- */
        .pantalla-carta {
            position: absolute;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: left;
            opacity: 0;
            transition: opacity 1s ease;
            overflow-y: auto; /* Scroll para móviles */
        }

        #carta {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--color-texto);
            white-space: pre-wrap;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.85);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Sticker final: Pollito y Corazón */
        .final-animado {
            font-size: 4.5rem;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            animation: flotar 1.5s infinite alternate ease-in-out;
            margin-bottom: 40px;
            letter-spacing: 10px;
        }

        @keyframes flotar {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* Clases utilitarias */
        .mostrar-flex { display: flex !important; }
        .opacidad-1 { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="contenedor-sobre" id="sobre" onclick="abrirSobre()">
        <div class="solapa"></div>
        <div class="sticker-corazon">❤️</div>
    </div>

    <div class="pantalla-carta" id="pantallaCarta">
        <div id="carta"></div>
        <div id="final" class="final-animado">🐥❤️</div>
    </div>

    <script>
        // Tu texto personalizado adaptado para la animación
        const texto = "Pollito,\n\nFeliz cumpleaños. 🎉\n\nQuién nos viera en la secundaria. Tú queriendo andar conmigo y yo bien terca diciéndote que solo amigos. Te traje de bajada un buen rato, ¿eh? Hasta que la vida me cerró la boca y me empecé a enamorar de ti. Y qué bueno que me pasó. 🥹\n\nDesde los 11. Piénsalo. Nos hemos visto crecer literalmente. Amigos, luego nada, luego todo. Hemos tenido días buenos, malos y malísimos donde juramos que ya. Pero aquí estamos. Siendo un equipo. 🤝\n\nMe gusta lo que somos. Me gusta que planeamos a lo grande: nuestra constructora, la casa, los críos (para armar el equipo americano). Solo dos, pollito, que luego me volveré loca de tanto crío. 🏠🏗️\n\nPero fuera de broma, estoy orgullosa de ti. De cómo le chingas, de cómo no te rajas, de cómo me cuidas aunque te haga enojar. Contigo sí veo futuro. Real. De esos que se construyen en obra negra y terminan en hogar. ✨\n\nTe amo. Y no porque suene bonito, sino porque llevamos media vida demostrándolo. 🫶\n\nPara tu cumpleaños solo quiero que seas feliz. Que se te cumpla todo lo que traes en la cabeza: los proyectos, la constructora, los viajes, la familia que soñamos. Y que lo celebremos juntos, como siempre. ✈️🎂\n\nLe vamos a seguir dando. Tú y yo, pollito contra el mundo. Porque si algo sabemos hacer es no rendirnos.\n\nDisfruta tu día. Te lo mereces todo.\nAquí tu pollita, hoy y siempre. 🐥\n\nFeliz cumpleaños, mi amor.";
        
        let index = 0;
        const velocidad = 65; /* Velocidad un poco más rápida y fluida */
        const sobre = document.getElementById('sobre');
        const pantallaCarta = document.getElementById('pantallaCarta');
        const contenedorCarta = document.getElementById('carta');
        const contenedorFinal = document.getElementById('final');

        function abrirSobre() {
            sobre.classList.add('abierto');
            
            setTimeout(() => {
                sobre.classList.add('desvanecer');
            }, 800);

            setTimeout(() => {
                sobre.style.display = 'none';
                pantallaCarta.classList.add('mostrar-flex');
                
                setTimeout(() => {
                    pantallaCarta.classList.add('opacidad-1');
                    escribirTexto();
                }, 50);
            }, 1300);
        }

        function escribirTexto() {
            if (index < texto.length) {
                contenedorCarta.textContent += texto.charAt(index);
                index++;
                
                // Mantiene el scroll automatizado hacia abajo mientras se escribe en el celular
                pantallaCarta.scrollTop = pantallaCarta.scrollHeight;
                
                setTimeout(escribirTexto, velocidad);
            } else {
                // Muestra el pollito y el corazón flotando al terminar de escribir
                setTimeout(() => {
                    contenedorFinal.classList.add('mostrar-flex');
                    setTimeout(() => {
                        contenedorFinal.classList.add('opacidad-1');
                        pantallaCarta.scrollTop = pantallaCarta.scrollHeight;
                    }, 50);
                }, 500);
            }
        }
    </script>
</body>
</html>
