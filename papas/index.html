<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños, Brandon</title>
    <style>
        :root {
            --color-bg: #fff2e6;            /* Naranja/crema muy claro para el fondo */
            --color-sobre: #ff944d;         /* Naranja vibrante para el sobre */
            --color-sobre-oscuro: #e67322;  /* Naranja medio */
            --color-sobre-interior: #cc5c11;/* Naranja profundo para el interior */
            --color-carta: #ffffff;         /* Fondo blanco para la carta */
            --color-texto: #4a2711;         /* Marrón/Moka oscuro para que el texto sea muy legible */
        }

        body {
            background-color: var(--color-bg);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- CONTENEDOR DEL SOBRE --- */
        .contenedor-sobre {
            position: relative;
            width: 280px;
            height: 180px;
            background-color: var(--color-sobre-oscuro);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.5s, opacity 0.5s ease;
        }

        /* Caras laterales e inferior del sobre */
        .contenedor-sobre::before {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: transparent var(--color-sobre) var(--color-sobre) transparent;
            border-radius: 0 0 10px 0;
            z-index: 3;
        }

        .contenedor-sobre::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: transparent transparent var(--color-sobre) var(--color-sobre);
            border-radius: 0 0 0 10px;
            z-index: 3;
        }

        /* Solapa superior del sobre */
        .solapa {
            position: absolute;
            top: 0; left: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: var(--color-sobre-interior) transparent transparent transparent;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 4;
        }

        /* Sticker de Familia para abrir el sobre */
        .sticker-familia {
            position: absolute;
            top: 75px;
            left: 125px;
            font-size: 2rem;
            z-index: 5;
            transition: transform 0.3s, opacity 0.3s;
            pointer-events: none;
        }

        /* --- ANIMACIÓN DE APERTURA --- */
        .contenedor-sobre.abierto .solapa {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .contenedor-sobre.abierto .sticker-familia {
            transform: scale(0);
            opacity: 0;
        }

        .contenedor-sobre.desvanecer {
            opacity: 0;
            transform: scale(0.5) translateY(100px);
            pointer-events: none;
        }

        /* --- SECCIÓN DE LA CARTA --- */
        .pantalla-carta {
            position: absolute;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: left;
            opacity: 0;
            transition: opacity 1s ease;
            overflow-y: auto;
        }

        #carta {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--color-texto);
            white-space: pre-wrap;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Stickers finales en conjunto */
        .final-animado {
            font-size: 4rem;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            animation: flotar 1.5s infinite alternate ease-in-out;
            margin-bottom: 40px;
            letter-spacing: 5px;
        }

        @keyframes flotar {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* Clases utilitarias */
        .mostrar-flex { display: flex !important; }
        .opacidad-1 { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="contenedor-sobre" id="sobre" onclick="abrirSobre()">
        <div class="solapa"></div>
        <div class="sticker-familia">👪</div>
    </div>

    <div class="pantalla-carta" id="pantallaCarta">
        <div id="carta"></div>
        <div id="final" class="final-animado">❤️🎂🙏</div>
    </div>

    <script>
        // Texto de los papás adaptado con emojis cálidos integrados
        const texto = "¡Feliz cumpleaños, Brandon! 🌟\n\nHoy quiero agradecer a Dios por el regalo tan hermoso que me dio al permitir que llegaras a mi vida. Contigo aprendí a ser madre, a amar de una manera que no sabía que existía, a ser fuerte en los momentos difíciles y a encontrar felicidad en las cosas más sencillas. 🤱✨\n\nHas sido una de las mayores bendiciones de mi vida. Verte crecer, superar obstáculos y convertirte en la persona que eres hoy llena mi corazón de orgullo y gratitud. Cada recuerdo a tu lado ocupa un lugar muy especial en mi alma. 📈❤️\n\nLe pido a Dios que te cuide, te proteja y te conceda muchos años más llenos de salud, amor, alegría y sueños cumplidos. Nunca olvides que, sin importar la edad que tengas, siempre serás ese gran regalo que cambió mi vida para siempre. 🎁🌿\n\nTe amo más de lo que las palabras pueden expresar y siempre estaré a tu lado, celebrando tus triunfos y acompañándote en cada paso de tu camino. 👣🏡\n\n¡Feliz cumpleaños, hijo querido! Que Dios derrame abundantes bendiciones sobre tu vida hoy y siempre.";
        
        let index = 0;
        const velocidad = 65; 
        const sobre = document.getElementById('sobre');
        const pantallaCarta = document.getElementById('pantallaCarta');
        const contenedorCarta = document.getElementById('carta');
        const contenedorFinal = document.getElementById('final');

        function abrirSobre() {
            sobre.classList.add('abierto');
            
            setTimeout(() => {
                sobre.classList.add('desvanecer');
            }, 800);

            setTimeout(() => {
                sobre.style.display = 'none';
                pantallaCarta.classList.add('mostrar-flex');
                
                setTimeout(() => {
                    pantallaCarta.classList.add('opacidad-1');
                    escribirTexto();
                }, 50);
            }, 1300);
        }

        function escribirTexto() {
            if (index < texto.length) {
                contenedorCarta.textContent += texto.charAt(index);
                index++;
                
                // Mantiene el scroll automático hacia abajo en el celular
                pantallaCarta.scrollTop = pantallaCarta.scrollHeight;
                
                setTimeout(escribirTexto, velocidad);
            } else {
                // Muestra los emojis finales flotando
                setTimeout(() => {
                    contenedorFinal.classList.add('mostrar-flex');
                    setTimeout(() => {
                        contenedorFinal.classList.add('opacidad-1');
                        pantallaCarta.scrollTop = pantallaCarta.scrollHeight;
                    }, 50);
                }, 500);
            }
        }
    </script>
</body>
</html>
