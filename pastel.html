<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <style>
        :root {
            --color-bg: #ffe6e6;
            --color-sobre: #ff6b6b;
            --color-sobre-oscuro: #e65c5c;
            --color-sobre-interior: #cc4e4e;
            --color-carta: #ffffff;
            --color-texto: #4a4a4a;
        }

        body {
            background-color: var(--color-bg);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- CONTENEDOR DEL SOBRE --- */
        .contenedor-sobre {
            position: relative;
            width: 280px;
            height: 180px;
            background-color: var(--color-sobre-oscuro);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.5s, opacity 0.5s ease;
        }

        /* Caras laterales e inferior del sobre (Efecto visual) */
        .contenedor-sobre::before {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: transparent var(--color-sobre) var(--color-sobre) transparent;
            border-radius: 0 0 10px 0;
            z-index: 3;
        }

        .contenedor-sobre::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: transparent transparent var(--color-sobre) var(--color-sobre);
            border-radius: 0 0 0 10px;
            z-index: 3;
        }

        /* Solapa superior del sobre */
        .solapa {
            position: absolute;
            top: 0; left: 0;
            border-width: 90px 140px;
            border-style: solid;
            border-color: var(--color-sobre-interior) transparent transparent transparent;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 4;
        }

        /* Pequeño corazón para invitar a hacer clic */
        .sticker-pastel {
            position: absolute;
            top: 40px;
            left: 100px;
            font-size: 4rem;
            z-index: 5;
            transition: transform 0.3s, opacity 0.3s;
        }

        /* --- ANIMACIÓN DE APERTURA --- */
        .contenedor-sobre.abierto .solapa {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .contenedor-sobre.abierto .sticker-corazon {
            transform: scale(0);
            opacity: 0;
        }

        .contenedor-sobre.desvanecer {
            opacity: 0;
            transform: scale(0.5) translateY(100px);
            pointer-events: none;
        }

        /* --- SECCIÓN DE LA CARTA --- */
        .pantalla-carta {
            position: absolute;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #carta {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--color-texto);
            white-space: pre-wrap;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .corazon-latido {
            font-size: 5rem;
            color: #ff4d4d;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            animation: latido 1.2s infinite alternate;
        }

        @keyframes latido {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Clases utilitarias */
        .mostrar-flex { display: flex !important; }
        .opacidad-1 { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="contenedor-sobre" id="sobre" onclick="abrirSobre()">
        <div class="solapa"></div>
        <div class="sticker-pastel">🎂</div>
    </div>

    <div class="pantalla-carta" id="pantallaCarta">
        <div id="carta"></div>
        <div id="corazon" class="corazon-latido">🎂</div>
    </div>

    <script>
        // Tu texto personalizado
        const texto = "Hola...\n\nAquí iría su carta.\n\nFeliz cumpleaños.";
        
        let index = 0;
        const velocidad = 70; 
        const sobre = document.getElementById('sobre');
        const pantallaCarta = document.getElementById('pantallaCarta');
        const contenedorCarta = document.getElementById('carta');
        const contenedorCorazon = document.getElementById('corazon');

        function abrirSobre() {
            // 1. Animamos la solapa abriéndose
            sobre.classList.add('abierto');
            
            // 2. Esperamos a que termine de abrirse el sobre para desvanecerlo
            setTimeout(() => {
                sobre.classList.add('desvanecer');
            }, 800);

            // 3. Mostramos la pantalla de la carta e iniciamos la máquina de escribir
            setTimeout(() => {
                sobre.style.display = 'none';
                pantallaCarta.classList.add('mostrar-flex');
                
                // Pequeño delay para que el fade-in de la carta sea suave
                setTimeout(() => {
                    pantallaCarta.classList.add('opacidad-1');
                    escribirTexto();
                }, 50);
            }, 1300);
        }

        function escribirTexto() {
            if (index < texto.length) {
                contenedorCarta.textContent += texto.charAt(index);
                index++;
                setTimeout(escribirTexto, velocidad);
            } else {
                // Cuando termina el texto, se muestra el corazón latiendo
                setTimeout(() => {
                    contenedorCorazon.classList.add('mostrar-flex');
                    setTimeout(() => contenedorCorazon.classList.add('opacidad-1'), 50);
                }, 500);
            }
        }
    </script>
</body>
</html>
